<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareLogs - View Items</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="dashboard_style.css" />
</head>
<body>
  <div class="app-wrapper">

    <nav class="sidebar" aria-label="Main navigation">
      <div class="sidebar-top">
        <div class="sidebar-logo">
          <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/UCC%20Logo-kr2wTR4mmnqUjoqS9xzuqcCRRRaZj4.png" alt="UCC" />
          <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/CSD%20Logo-jaXogTMhplm8CKCwXUlZvYjEFFWnIH.png" alt="CSD" />
        </div>
        <a href="dashboard.html" class="nav-item">Home</a>
        <a href="addstudent.html" class="nav-item">Add Student Log</a>
        <a href="additems.html" class="nav-item">Add Item</a>
        <a href="viewitems.html" class="nav-item active">View Items</a>
        <a href="viewlogs.html" class="nav-item">View Logs</a>
      </div>
      <div class="sidebar-bottom">
        <a href="login.html" id="logoutBtn" class="logout-btn">Log out</a>
      </div>
    </nav>

    <main class="main-content">
      <div class="top-bar">
        <div class="top-bar-left">
          <h1>Medical <span>Inventory</span></h1>
        </div>
        <div class="top-bar-right">
          <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/CareLogo-T6dnwpOU1LdcmRR7p6O9XKb653isPE.png" alt="CareLogs" />
        </div>
      </div>

      <div class="page-body">
        <div class="alert success" id="alertSuccess">Item updated successfully!</div>
        <div class="alert error" id="alertError">An error occurred. Please try again.</div>

        <div class="search-bar-wrap">
          <input class="search-input" id="searchItems" type="search" placeholder="Search items..." />
          <select class="search-input" id="filterCategory" style="max-width:200px;">
            <option value="">All Categories</option>
            <option value="Medicine">Medicine</option>
            <option value="First Aid Supply">First Aid Supply</option>
            <option value="Equipment">Equipment</option>
            <option value="Dental Supply">Dental Supply</option>
            <option value="Other">Other</option>
          </select>
          <a href="additems.html" class="btn-primary" style="padding:12px 24px; font-size:15px; border-radius:30px; text-decoration:none;">+ Add Item</a>
        </div>

        <div class="table-box">
          <table class="data-table" aria-label="Medical inventory table">
            <thead>
              <tr>
                <th>#</th>
                <th>Item Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Unit</th>
                <th>Expiry Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="itemsTableBody">
              <tr>
                <td colspan="8" class="empty-state">No items in inventory yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
    <div class="modal-box">
      <button class="modal-close" id="closeEditModal" aria-label="Close modal">&times;</button>
      <h2 class="modal-title" id="editModalTitle">Edit Item</h2>
      <input type="hidden" id="editItemId" />

      <div class="inner-form-field" style="width:100%;">
        <label class="field-label" for="editItemName">Item Name</label>
        <input class="field-input" id="editItemName" type="text" />
      </div>
      <div class="inner-form-field" style="width:100%;">
        <label class="field-label" for="editItemCategory">Category</label>
        <div class="inner-select-wrapper">
          <select class="field-select" id="editItemCategory">
            <option value="Medicine">Medicine</option>
            <option value="First Aid Supply">First Aid Supply</option>
            <option value="Equipment">Equipment</option>
            <option value="Dental Supply">Dental Supply</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div style="display:flex; gap:16px;">
        <div class="inner-form-field" style="flex:1;">
          <label class="field-label" for="editItemQty">Quantity</label>
          <input class="field-input" id="editItemQty" type="number" min="0" />
        </div>
        <div class="inner-form-field" style="flex:1;">
          <label class="field-label" for="editItemUnit">Unit</label>
          <input class="field-input" id="editItemUnit" type="text" />
        </div>
      </div>
      <div class="inner-form-field" style="width:100%;">
        <label class="field-label" for="editItemExpiry">Expiry Date</label>
        <input class="field-input" id="editItemExpiry" type="date" />
      </div>
      <div class="inner-form-field" style="width:100%;">
        <label class="field-label" for="editItemThreshold">Low Stock Threshold</label>
        <input class="field-input" id="editItemThreshold" type="number" min="0" />
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" id="cancelEditBtn">Cancel</button>
        <button class="btn-primary" id="saveEditBtn">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="viewitems_script.js"></script>
</body>
</html>
