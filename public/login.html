<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareLogs - Login</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="login_style.css" />
</head>
<body>
  <main class="login">
    <div class="card">

      <section class="left-panel" aria-label="Application branding">
        <div class="logo-images">
          <img class="ucclogo" src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/UCC%20Logo-kr2wTR4mmnqUjoqS9xzuqcCRRRaZj4.png" alt="University of Caloocan City Logo" />
          <img class="csdlogo" src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/CSD%20Logo-jaXogTMhplm8CKCwXUlZvYjEFFWnIH.png" alt="CSD Logo" />
        </div>
        <div class="system-name">
          <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/System%20Name-M0aDieTy7AQobbdBFuLfKLGgDRDygT.png" alt="CareLogs - School Clinic Management System" />
        </div>
      </section>

      <section class="right-panel" aria-label="Login form">
                  <h1 class="text-wrapper-5">Login</h1>
        <div id="loginForm">
          <div class="msg-error" id="errorMsg"></div>

          <div class="form-field">
            <label class="field-label" for="email">Username / Email</label>
            <input class="field-input" id="email" type="text" placeholder="Please enter your username" autocomplete="username" required />
          </div>

          <div class="form-field">
            <label class="field-label" for="password">Password</label>
            <input class="field-input" id="password" type="password" placeholder="Please enter your password" autocomplete="current-password" required />
          </div>

          <div class="form-field">
            <label class="field-label" for="position">Position</label>
            <div class="field-select-wrapper">
              <select class="field-select" id="position" required>
                <option value="" disabled selected>Please select Position</option>
                <option value="nurse">Nurse</option>
                <option value="dentist">Dentist</option>
                <option value="psychometrician">Psychometrician</option>
                <option value="staff">Staff</option>
              </select>
            </div>
          </div>

          <button class="btn-submit" id="loginBtn" type="button">Login</button>

          <p class="form-footer">
            Don&apos;t have an account yet?
            <a href="register.html">Create an account</a>
          </p>
        </div>

        <div class="msg-success" id="successMsg">
          <p class="success-title">Login Successful!</p>
          <p class="success-sub">Redirecting to CareLogs dashboard...</p>
        </div>

        <div class="care-logo-bottom">
          <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/CareLogo-T6dnwpOU1LdcmRR7p6O9XKb653isPE.png" alt="CareLogs" />
        </div>
      </section>
    </div>
  </main>

  <script src="db.js"></script>
  <script src="login_script.js"></script>
</body>
</html>
