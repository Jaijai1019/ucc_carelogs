<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareLogs - Add Item</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="dashboard_style.css" />
</head>
<body>
  <div class="app-wrapper">
    <!-- sidebar shi -->
    <nav class="sidebar" aria-label="Main navigation">
      <div class="sidebar-top">
        <div class="sidebar-logo">
          <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/UCC%20Logo-kr2wTR4mmnqUjoqS9xzuqcCRRRaZj4.png" alt="UCC" />
          <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/CSD%20Logo-jaXogTMhplm8CKCwXUlZvYjEFFWnIH.png" alt="CSD" />
        </div>
        <a href="dashboard.html" class="nav-item">Home</a>
        <a href="addstudent.html" class="nav-item">Add Student Log</a>
        <a href="additems.html" class="nav-item active">Add Item</a>
        <a href="viewitems.html" class="nav-item">View Items</a>
        <a href="viewlogs.html" class="nav-item">View Logs</a>
      </div>
      <div class="sidebar-bottom">
        <a href="login.html" id="logoutBtn" class="logout-btn">Log out</a>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="top-bar">
        <div class="top-bar-left">
          <h1>Add <span>Inventory Item</span></h1>
        </div>
        <div class="top-bar-right">
          <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/CareLogo-T6dnwpOU1LdcmRR7p6O9XKb653isPE.png" alt="CareLogs" />
        </div>
      </div>

      <div class="page-body">
        <div class="alert success" id="alertSuccess">Item saved to inventory successfully!</div>
        <div class="alert error" id="alertError">Please fill in all required fields.</div>

        <div class="form-card">
          <p class="page-title" style="font-size:18px; margin-bottom:20px;">Item Information</p>

          <div class="inner-form-field" style="width:100%;">
            <label class="field-label" for="itemName">Item Name *</label>
            <input class="field-input" id="itemName" type="text" placeholder="e.g. Biogesic, Bandage" required />
          </div>

          <div class="inner-form-field" style="width:100%;">
            <label class="field-label" for="itemCategory">Category *</label>
            <div class="inner-select-wrapper">
              <select class="field-select" id="itemCategory" required>
                <option value="" disabled selected>Select Category</option>
                <option value="Medicine">Medicine</option>
                <option value="First Aid Supply">First Aid Supply</option>
                <option value="Equipment">Equipment</option>
                <option value="Dental Supply">Dental Supply</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="inner-form-field">
              <label class="field-label" for="itemQuantity">Quantity *</label>
              <input class="field-input" id="itemQuantity" type="number" min="0" placeholder="e.g. 50" required />
            </div>
            <div class="inner-form-field">
              <label class="field-label" for="itemUnit">Unit</label>
              <input class="field-input" id="itemUnit" type="text" placeholder="e.g. pcs, tablets, ml" />
            </div>
          </div>

          <div class="form-row">
            <div class="inner-form-field">
              <label class="field-label" for="itemExpiry">Expiry Date</label>
              <input class="field-input" id="itemExpiry" type="date" />
            </div>
            <div class="inner-form-field">
              <label class="field-label" for="itemLowThreshold">Low Stock Threshold</label>
              <input class="field-input" id="itemLowThreshold" type="number" min="0" placeholder="e.g. 10" />
            </div>
          </div>

          <div class="inner-form-field" style="width:100%;">
            <label class="field-label" for="itemDescription">Description / Notes</label>
            <input class="field-input" id="itemDescription" type="text" placeholder="Optional description" />
          </div>

          <div style="display:flex; gap:14px; margin-top:8px;">
            <button class="btn-primary" id="saveItemBtn" type="button">Save Item</button>
            <button class="btn-cancel" id="clearItemBtn" type="button">Clear</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="db.js"></script>
  <script src="additems_script.js"></script>
</body>
</html>
