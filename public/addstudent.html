<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareLogs - Add Student Log</title>
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="dashboard_style.css" />
</head>
<body>
  <div class="app-wrapper">
    <!-- SIDEBAR -->
    <nav class="sidebar" aria-label="Main navigation">
      <div class="sidebar-top">
        <div class="sidebar-logo">
          <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/UCC%20Logo-kr2wTR4mmnqUjoqS9xzuqcCRRRaZj4.png" alt="UCC" />
          <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/CSD%20Logo-jaXogTMhplm8CKCwXUlZvYjEFFWnIH.png" alt="CSD" />
        </div>
        <a href="dashboard.html" class="nav-item">Home</a>
        <a href="addstudent.html" class="nav-item active">Add Student Log</a>
        <a href="additems.html" class="nav-item">Add Item</a>
        <a href="viewitems.html" class="nav-item">View Items</a>
        <a href="viewlogs.html" class="nav-item">View Logs</a>
      </div>
      <div class="sidebar-bottom">
        <a href="login.html" id="logoutBtn" class="logout-btn">Log out</a>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="top-bar">
        <div class="top-bar-left">
          <h1>Add <span>Student Log</span></h1>
        </div>
        <div class="top-bar-right">
          <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/CareLogo-T6dnwpOU1LdcmRR7p6O9XKb653isPE.png" alt="CareLogs" />
        </div>
      </div>

      <div class="page-body">
        <div class="alert success" id="alertSuccess">Clinic log saved successfully!</div>
        <div class="alert error" id="alertError">Please fill in all required fields.</div>

        <div class="form-card">
          <!-- STUDENT INFO -->
          <p class="page-title" style="font-size:18px; margin-bottom:20px;">Student Information</p>

          <div class="form-row">
            <div class="inner-form-field">
              <label class="field-label" for="stuFirstName">First Name *</label>
              <input class="field-input" id="stuFirstName" type="text" placeholder="Juan" required />
            </div>
            <div class="inner-form-field">
              <label class="field-label" for="stuLastName">Last Name *</label>
              <input class="field-input" id="stuLastName" type="text" placeholder="dela Cruz" required />
            </div>
          </div>

          <div class="form-row">
            <div class="inner-form-field">
              <label class="field-label" for="stuID">Student ID *</label>
              <input class="field-input" id="stuID" type="text" placeholder="e.g. 2024-00001" required />
            </div>
            <div class="inner-form-field">
              <label class="field-label" for="stuCourse">Course / Year *</label>
              <input class="field-input" id="stuCourse" type="text" placeholder="e.g. BSCS-1A" required />
            </div>
          </div>

          <div class="inner-form-field" style="width:100%;">
            <label class="field-label" for="stuGender">Gender</label>
            <div class="inner-select-wrapper">
              <select class="field-select" id="stuGender">
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <!-- VISIT INFO -->
          <p class="page-title" style="font-size:18px; margin-bottom:20px; margin-top:10px;">Visit Details</p>

          <div class="form-row">
            <div class="inner-form-field">
              <label class="field-label" for="visitDate">Date *</label>
              <input class="field-input" id="visitDate" type="date" required />
            </div>
            <div class="inner-form-field">
              <label class="field-label" for="visitTime">Time</label>
              <input class="field-input" id="visitTime" type="time" />
            </div>
          </div>

          <div class="inner-form-field" style="width:100%;">
            <label class="field-label" for="complaint">Complaint / Reason for Visit</label>
            <input class="field-input" id="complaint" type="text" placeholder="e.g. Headache, Fever" />
          </div>

          <div class="inner-form-field" style="width:100%;">
            <label class="field-label" for="itemGiven">Item / Medicine Given</label>
            <div class="inner-select-wrapper">
              <select class="field-select" id="itemGiven">
                <option value="" disabled selected>Select from inventory</option>
              </select>
            </div>
          </div>

          <div class="inner-form-field" style="width:100%;">
            <label class="field-label" for="quantityGiven">Quantity Given</label>
            <input class="field-input" id="quantityGiven" type="number" min="1" value="1" placeholder="1" />
          </div>

          <div class="inner-form-field" style="width:100%; height:auto; padding-top:18px; padding-bottom:14px;">
            <label class="field-label" for="notes">Notes / Remarks</label>
            <textarea class="field-input" id="notes" rows="3"
              style="resize:vertical; height:auto; padding-top:8px; padding-bottom:8px;"
              placeholder="Additional observations..."></textarea>
          </div>

          <div style="display:flex; gap:14px; margin-top:8px;">
            <button class="btn-primary" id="saveLogBtn" type="button">Save Log</button>
            <button class="btn-cancel" id="clearLogBtn" type="button">Clear</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="db.js"></script>
  <script src="addstudent_script.js"></script>
</body>
</html>
